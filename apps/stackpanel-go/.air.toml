#:schema https://json.schemastore.org/any.json

# Air configuration for stackpanel-go development
# Run `air` in this directory for live reload
# See: https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
# Run go mod tidy, then gomod2nix only if go.sum changed, then build
cmd = """
go mod tidy && \
HASH=$(md5 -q go.sum 2>/dev/null || md5sum go.sum | cut -d' ' -f1) && \
if [ ! -f tmp/.go.sum.hash ] || [ "$HASH" != "$(cat tmp/.go.sum.hash)" ]; then \
  echo 'go.sum changed, running gomod2nix...' && \
  gomod2nix && \
  echo "$HASH" > tmp/.go.sum.hash; \
fi && \
go build -o ./tmp/stackpanel .
"""
bin = "./tmp/stackpanel"
include_ext = ["go", "tpl", "tmpl", "html", "md"]
include_dir = ["cmd", "internal", "pkg"]
exclude_dir = ["tmp", "vendor", ".git", "build", "node_modules"]
exclude_file = []
exclude_unchanged = false
follow_symlink = false
delay = 200
stop_on_error = true
send_interrupt = false
kill_delay = 500
args_bin = ["agent", "--debug"]
rerun = false
rerun_delay = 500

[log]
time = false
main_only = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
