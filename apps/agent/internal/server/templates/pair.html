<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stackpanel Agent Pairing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --background: oklch(0.08 0 0);
        --foreground: oklch(0.98 0 0);
        --card: oklch(0.12 0 0);
        --card-foreground: oklch(0.98 0 0);
        --muted-foreground: oklch(0.6 0 0);
        --border: oklch(0.22 0 0);
        --accent: oklch(0.7 0.15 145);
        --accent-foreground: oklch(0.08 0 0);
        --radius: 0.5rem;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Montserrat", "Helvetica Neue", Helvetica, Arial,
          sans-serif;
        background: var(--background);
        color: var(--foreground);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-weight: 400;
      }

      .card {
        max-width: 480px;
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: calc(var(--radius) + 4px);
        padding: 28px 24px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
      }

      .logo svg {
        width: 28px;
        height: 28px;
      }

      .logo-text {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      h2 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 12px;
        letter-spacing: -0.02em;
      }

      .description {
        color: var(--muted-foreground);
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 16px;
      }

      .project-path {
        background: var(--background);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
        font-family: "Geist Mono", "SF Mono", Monaco, "Cascadia Code", Consolas,
          monospace;
        font-size: 13px;
        color: var(--foreground);
        overflow-x: auto;
        margin-bottom: 20px;
        word-break: break-all;
      }

      .actions {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      button {
        padding: 10px 20px;
        border-radius: var(--radius);
        border: none;
        background: var(--accent);
        color: var(--accent-foreground);
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.15s, transform 0.1s;
      }

      button:hover {
        opacity: 0.9;
      }

      button:active {
        transform: scale(0.98);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #status {
        color: var(--muted-foreground);
        font-size: 13px;
      }

      #status.success {
        color: var(--accent);
      }

      #status.error {
        color: oklch(0.65 0.2 25);
      }

      .footer {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
        color: var(--muted-foreground);
        font-size: 12px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect
            x="3"
            y="3"
            width="18"
            height="18"
            rx="3"
            stroke="currentColor"
            stroke-width="2"
          />
          <rect x="7" y="7" width="4" height="4" rx="1" fill="currentColor" />
          <rect x="13" y="7" width="4" height="4" rx="1" fill="currentColor" />
          <rect x="7" y="13" width="4" height="4" rx="1" fill="currentColor" />
          <rect x="13" y="13" width="4" height="4" rx="1" fill="currentColor" />
        </svg>
        <span class="logo-text">Stackpanel</span>
      </div>
      <h2>Pair Agent</h2>
      <p class="description">
        Grant the Stackpanel web UI permission to manage files and run local
        commands in this project:
      </p>
      <div class="project-path">{{.ProjectRoot}}</div>
      <div class="actions">
        <button id="pairBtn" type="button">Pair</button>
        <span id="status"></span>
      </div>
      <p class="footer">
        If this window wasn't opened by Stackpanel, close it immediately.
      </p>
    </div>
    <script>
      (() => {
        const targetOrigin = {{.TargetOrigin}};
        const token = {{.Token}};
        const statusEl = document.getElementById("status");
        const btn = document.getElementById("pairBtn");

        btn.addEventListener("click", () => {
          if (!window.opener) {
            statusEl.textContent = "No opener window found. Return to Stackpanel.";
            statusEl.className = "error";
            return;
          }
          window.opener.postMessage({ type: "stackpanel.agent.pair", token }, targetOrigin);
          statusEl.textContent = "Paired! You can close this window.";
          statusEl.className = "success";
          btn.disabled = true;
          setTimeout(() => window.close(), 400);
        });
      })();
    </script>
  </body>
</html>
