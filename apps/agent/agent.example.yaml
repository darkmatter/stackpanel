# stackpanel agent - local development server for StackPanel

# Project root for file operations
# This is typically set automatically via the project manager or STACKPANEL_PROJECT_ROOT env var
# Leave empty to use the agent's project selection UI
# project_root: "/path/to/your/project"

# Port for local WebSocket/HTTP server
port: 9876

# StackPanel API endpoint (for cloud sync)
api_endpoint: "https://stackpanel.dev/api/agent"

# Authentication token (set via STACKPANEL_AUTH_TOKEN env var)
# auth_token: ""

# Allowed commands (empty = all allowed)
# For security, you can restrict which commands the agent can run
allowed_commands: []
  # - nix
  # - git

# Data directory for agent state (stores project history, tokens, etc.)
data_dir: ~/.stackpanel

# Allowed web UI origins for CORS (localhost origins are always allowed)
# Add your deployment URLs here if accessing from non-localhost
allowed_origins: []
  # - "https://stackpanel.dev"
  # - "https://your-custom-domain.com"
