# Fly config for the stackpanel cloud API.
# Create the app with `fly launch --no-deploy` then `fly deploy`.
# Domain: set via `fly certs add api.stackpanel.com` after first deploy.

app = "stackpanel-api"
primary_region = "iad"  # TODO: confirm region with user
kill_signal = "SIGTERM"
kill_timeout = "15s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  # STACKPANEL_KMS_ALIAS is set as a Fly secret; the alias is the same
  # across stages, the AWS credentials differentiate access.

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
  cpu_kind = "shared"
