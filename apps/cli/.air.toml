#:schema https://json.schemastore.org/any.json

# Air configuration for stackpanel CLI development
# Run `air` in this directory for live reload
# See: https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/stackpanel ."
bin = "./tmp/stackpanel"
include_ext = ["go", "tpl", "tmpl", "html", "md"]
include_dir = ["cmd", "internal"]
exclude_dir = ["tmp", "vendor", ".git", "build"]
exclude_file = []
exclude_unchanged = false
follow_symlink = false
delay = 200
stop_on_error = true
send_interrupt = false
kill_delay = 500
args_bin = ["status"]
rerun = false
rerun_delay = 500

[log]
time = false
main_only = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
