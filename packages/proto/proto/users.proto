syntax = "proto3";

package stackpanel.db;
option go_package = "github.com/darkmatter/stackpanel/packages/proto/gen/gopb";

// A team member with access to the project
message User {
  string name = 1; // Display name of the user
  optional string github = 2; // GitHub username
  optional string email = 3; // Email address
}

// Map of username to user configuration
message Users {
  map<string, User> users = 1; // Map of username to user config
}
