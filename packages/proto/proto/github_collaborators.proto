syntax = "proto3";

package stackpanel.db;
option go_package = "github.com/darkmatter/stackpanel/packages/proto/gen/go";

// Repository permission level
enum CollaboratorRole {
  COLLABORATOR_ROLE_UNSPECIFIED = 0;
  COLLABORATOR_ROLE_READ = 1;
  COLLABORATOR_ROLE_TRIAGE = 2;
  COLLABORATOR_ROLE_WRITE = 3;
  COLLABORATOR_ROLE_MAINTAIN = 4;
  COLLABORATOR_ROLE_ADMIN = 5;
}

// A GitHub collaborator
message Collaborator {
  string login = 1; // GitHub username/login
  int64 id = 2; // GitHub user ID
  CollaboratorRole role = 3; // Repository permission level
  bool is_admin = 4; // Whether this user has admin permissions
  repeated string public_keys = 5; // SSH public keys from GitHub
}

// Auto-generated GitHub collaborators data
message GithubCollaborators {
  Meta meta = 1; // Metadata about this generated file
  map<string, Collaborator> collaborators = 2; // Map of username to collaborator data
}

// Metadata about this generated file
message Meta {
  string source = 1; // GitHub repository source (e.g., github:owner/repo)
  string generated_at = 2; // ISO 8601 timestamp of when this file was generated
}
