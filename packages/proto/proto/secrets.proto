syntax = "proto3";

package stackpanel.db;
option go_package = "github.com/darkmatter/stackpanel/packages/proto/gen/gopb";

// Programming language for generated code
enum CodegenLanguage {
  CODEGEN_LANGUAGE_UNSPECIFIED = 0;
  CODEGEN_LANGUAGE_TYPESCRIPT = 1;
  CODEGEN_LANGUAGE_GO = 2;
}

// Code generation settings for a target language
message Codegen {
  string name = 1; // Name of the generated code package
  string directory = 2; // Output directory for generated code (relative to project root)
  CodegenLanguage language = 3; // Programming language for generated code
}

// Secrets management configuration
message Secrets {
  bool enable = 1; // Enable secrets management
  string input_directory = 2; // Directory where SOPS-encrypted secrets are stored
  map<string, SecretsEnvironment> environments = 3; // Environment-specific secrets configurations
  map<string, Codegen> codegen = 4; // Code generation settings per target
  repeated string system_keys = 5; // AGE public keys for system-level access (CI, deploy servers). These keys can decrypt all secrets regardless of environment restrictions.
  optional string secrets_dir = 6; // Directory where individual secret .age files are stored (default: .stackpanel/secrets/vars)
  repeated string age_key_files = 7; // Paths to AGE key files to check for decryption (checked in order, first existing file wins)
}

// Environment-specific secrets configuration
message SecretsEnvironment {
  string name = 1; // Name of the environment (e.g., 'production', 'staging')
  repeated string public_keys = 2; // AGE public keys that can decrypt secrets for this environment
  repeated string sources = 3; // List of SOPS-encrypted source files for this environment (without .yaml extension)
}
