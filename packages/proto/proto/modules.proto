syntax = "proto3";

package stackpanel.db;
option go_package = "github.com/darkmatter/stackpanel/packages/proto/gen/gopb";

// Category for grouping modules in the UI
enum ModuleCategory {
  MODULE_CATEGORY_UNSPECIFIED = 0;
  MODULE_CATEGORY_INFRASTRUCTURE = 1;
  MODULE_CATEGORY_CI_CD = 2;
  MODULE_CATEGORY_DATABASE = 3;
  MODULE_CATEGORY_SECRETS = 4;
  MODULE_CATEGORY_DEPLOYMENT = 5;
  MODULE_CATEGORY_DEVELOPMENT = 6;
  MODULE_CATEGORY_MONITORING = 7;
  MODULE_CATEGORY_INTEGRATION = 8;
  MODULE_CATEGORY_LANGUAGE = 9;
  MODULE_CATEGORY_SERVICE = 10;
}

// Type of field in a panel
enum ModuleFieldType {
  MODULE_FIELD_TYPE_UNSPECIFIED = 0;
  MODULE_FIELD_TYPE_STRING = 1;
  MODULE_FIELD_TYPE_NUMBER = 2;
  MODULE_FIELD_TYPE_BOOLEAN = 3;
  MODULE_FIELD_TYPE_SELECT = 4;
  MODULE_FIELD_TYPE_MULTISELECT = 5;
  MODULE_FIELD_TYPE_APP_FILTER = 6;
  MODULE_FIELD_TYPE_COLUMNS = 7;
  MODULE_FIELD_TYPE_JSON = 8;
}

// Type of UI panel to render
enum ModulePanelType {
  MODULE_PANEL_TYPE_UNSPECIFIED = 0;
  MODULE_PANEL_TYPE_STATUS = 1;
  MODULE_PANEL_TYPE_APPS_GRID = 2;
  MODULE_PANEL_TYPE_FORM = 3;
  MODULE_PANEL_TYPE_TABLE = 4;
  MODULE_PANEL_TYPE_CUSTOM = 5;
}

// Where the module comes from
enum ModuleSourceType {
  MODULE_SOURCE_TYPE_UNSPECIFIED = 0;
  MODULE_SOURCE_TYPE_BUILTIN = 1;
  MODULE_SOURCE_TYPE_LOCAL = 2;
  MODULE_SOURCE_TYPE_FLAKE_INPUT = 3;
  MODULE_SOURCE_TYPE_REGISTRY = 4;
}

// Request to disable a module
message DisableModuleRequest {
  string module_id = 1; // Module identifier to disable (example: "postgres")
}

// Request to enable a module
message EnableModuleRequest {
  string module_id = 1; // Module identifier to enable (example: "postgres")
  map<string, string> settings = 2; // Initial settings (optional)
}

// Request to get module outputs
message GetModuleOutputsRequest {
  string module_id = 1; // Module identifier (example: "postgres")
}

// Configuration for a stackpanel module
message Module {
  string id = 1; // Module identifier (e.g., 'oxlint', 'postgres') (example: "postgres")
  bool enable = 2; // Whether the module is enabled (example: true)
  ModuleMeta meta = 3; // Display metadata
  ModuleSource source = 4; // Source configuration
  ModuleFeatures features = 5; // Feature flags
  repeated string requires = 6; // Required modules (example: "process-compose")
  repeated string conflicts = 7; // Conflicting modules (example: "mysql")
  int32 priority = 8; // Load order priority (lower = earlier) (example: 50)
  repeated string tags = 9; // Tags for filtering (example: "database")
  /*
   * JSON Schema for generating configuration forms.
   * Describes the module's configurable options.
   *  (example: "{ \"type\": \"object\", \"properties\": { \"version\": { \"type\": \"string\" } } }")
   */
  optional string config_schema = 10;
  /*
   * Module-level settings (key-value pairs).
   * These are passed to the Nix module configuration.
   * 
   */
  map<string, string> settings = 11;
  repeated ModulePanel panels = 12; // UI panels
  map<string, ModuleAppData> apps = 13; // Per-app module data
  optional string healthcheck_module = 14; // Linked healthcheck module name (example: "postgres")
}

// Module data for a specific app
message ModuleAppData {
  bool enabled = 1; // Whether module is enabled for this app (example: true)
  map<string, string> config = 2; // Module config (string key-value pairs)
}

// Which stackpanel features this module uses
message ModuleFeatures {
  bool files = 1; // Generates files via stackpanel.files (example: true)
  bool scripts = 2; // Provides shell scripts/commands (example: true)
  bool tasks = 3; // Defines turborepo tasks (example: false)
  bool healthchecks = 4; // Defines health checks (example: true)
  bool services = 5; // Configures background services (example: true)
  bool secrets = 6; // Manages secrets/variables (example: false)
  bool packages = 7; // Adds devshell packages (example: true)
  bool app_module = 8; // Extends per-app configuration (example: false)
}

// Display metadata for a module
message ModuleMeta {
  string name = 1; // Display name of the module (example: "PostgreSQL")
  optional string description = 2; // Human-readable description (example: "Managed PostgreSQL service for local development")
  optional string icon = 3; // Lucide icon name (e.g., 'database', 'box') (example: "database")
  ModuleCategory category = 4; // Category for UI grouping
  optional string author = 5; // Author or maintainer (example: "Darkmatter")
  optional string version = 6; // Module version (example: "1.2.0")
  optional string homepage = 7; // URL to documentation or repository (example: "https://stackpanel.dev/docs/modules/postgres")
}

// A file generated by a module
message ModuleOutputFile {
  string path = 1; // File path relative to project root (example: ".stack/state/postgres.conf")
  optional string description = 2; // Description of the file (example: "Generated PostgreSQL config")
  string type = 3; // File type: text, derivation, symlink (example: "text")
}

// A healthcheck defined by a module
message ModuleOutputHealthcheck {
  string id = 1; // Healthcheck ID (example: "postgres-port")
  string name = 2; // Display name (example: "PostgreSQL listening")
  optional string description = 3; // Description of what it checks (example: "TCP probe against the assigned port")
  string severity = 4; // Severity: critical, warning, info (example: "critical")
  string type = 5; // Check type: script, http, tcp, nix (example: "tcp")
}

// A package added by a module
message ModuleOutputPackage {
  string name = 1; // Package name (example: "postgresql_16")
  optional string version = 2; // Package version (example: "16.4")
  optional string description = 3; // Package description (example: "PostgreSQL 16 server and client")
}

// A script provided by a module
message ModuleOutputScript {
  string name = 1; // Script name (command) (example: "pg-reset")
  optional string description = 2; // Description of what the script does (example: "Drop and recreate the development database")
}

// Aggregated outputs of what a module creates
message ModuleOutputs {
  string module_id = 1; // Module identifier (example: "postgres")
  repeated ModuleOutputFile files = 2; // Generated files
  repeated ModuleOutputScript scripts = 3; // Provided scripts
  repeated ModuleOutputHealthcheck healthchecks = 4; // Health checks
  repeated ModuleOutputPackage packages = 5; // Added packages
}

// A UI panel provided by a module
message ModulePanel {
  string id = 1; // Unique panel identifier (example: "postgres-status")
  string title = 2; // Display title (example: "Postgres")
  optional string description = 3; // Panel description (example: "Process status, port, and connection string")
  ModulePanelType type = 4; // Panel type (determines component)
  int32 order = 5; // Display order (lower = first) (example: 20)
  repeated ModulePanelField fields = 6; // Panel configuration fields
}

// A field in a module panel
message ModulePanelField {
  string name = 1; // Field name (maps to component prop) (example: "version")
  ModuleFieldType type = 2; // Field type
  string value = 3; // Field value (JSON-encoded for complex types) (example: "16")
  repeated string options = 4; // Options for select fields (example: "16")
}

// Response containing a single module
message ModuleResponse {
  Module module = 1; // The module
  bool success = 2; // Whether the operation succeeded (example: true)
  optional string message = 3; // Status message (example: "Module enabled")
}

// Where the module comes from
message ModuleSource {
  ModuleSourceType type = 1; // Source type
  optional string flake_input = 2; // Flake input name (for flake-input type) (example: "stackpanel-postgres")
  optional string path = 3; // Local path (for local type) (example: "./modules/postgres")
  optional string registry_id = 4; // Registry ID (e.g., 'stackpanel/docker') (example: "stackpanel/postgres")
  optional string ref = 5; // Git ref (branch, tag, commit) (example: "main")
}

// Map of module ID to module configuration
message Modules {
  map<string, Module> modules = 1; // Map of module ID to config
}

// Request to update module settings
message UpdateModuleSettingsRequest {
  string module_id = 1; // Module identifier (example: "postgres")
  map<string, string> settings = 2; // New settings
}
