syntax = "proto3";

package stackpanel.db;
option go_package = "github.com/darkmatter/stackpanel/packages/proto/gen/gopb";

// SST infrastructure configuration for AWS provisioning
message Sst {
  bool enable = 1; // Enable SST infrastructure provisioning (example: true)
  string project_name = 2; // SST project name (example: "stackpanel")
  string region = 3; // AWS region (example: "us-west-2")
  string account_id = 4; // AWS account ID (example: "123456789012")
  string config_path = 5; // Path to generate sst.config.ts (example: "packages/infra/sst.config.ts")
  SstKms kms = 6; // KMS configuration
  SstOidc oidc = 7; // OIDC provider configuration
  SstIam iam = 8; // IAM configuration
}

// Fly.io OIDC configuration
message SstFlyio {
  string org_id = 1; // Fly.io organization ID (example: "darkmatter-io")
  string app_name = 2; // Fly.io app name (or * for all) (example: "*")
}

// GitHub Actions OIDC configuration
message SstGithubActions {
  string org = 1; // GitHub organization (example: "darkmatter")
  string repo = 2; // GitHub repository (or * for all) (example: "stackpanel")
}

// IAM role configuration
message SstIam {
  string role_name = 1; // IAM role name (example: "stackpanel-secrets-role")
}

// KMS key configuration for secrets encryption
message SstKms {
  bool enable = 1; // Create a KMS key for secrets (example: true)
  string alias = 2; // KMS key alias (example: "stackpanel-secrets")
  int32 deletion_window_days = 3; // Days before key deletion (example: 30)
}

// OIDC provider configuration for IAM role assumption
message SstOidc {
  string provider = 1; // OIDC provider type (github-actions, flyio, roles-anywhere) (example: "github-actions")
  SstGithubActions github_actions = 2; // GitHub Actions OIDC settings
  SstFlyio flyio = 3; // Fly.io OIDC settings
  SstRolesAnywhere roles_anywhere = 4; // Roles Anywhere settings
}

// AWS Roles Anywhere configuration
message SstRolesAnywhere {
  string trust_anchor_arn = 1; // Trust anchor ARN (example: "arn:aws:rolesanywhere:us-west-2:123456789012:trust-anchor/abcd1234")
}
