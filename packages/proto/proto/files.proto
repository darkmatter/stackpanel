syntax = "proto3";

package stackpanel.db;
option go_package = "github.com/darkmatter/stackpanel/packages/proto/gen/gopb";

// Type of file content source
enum FileType {
  FILE_TYPE_UNSPECIFIED = 0;
  FILE_TYPE_TEXT = 1;
  FILE_TYPE_DERIVATION = 2;
  FILE_TYPE_JSON = 3;
}

// A file to be generated into the project workspace
message GeneratedFile {
  string path = 1; // Relative path from project root where file will be written (example: ".stack/gen/ide/vscode/settings.json")
  FileType type = 2; // Type of content source (text or derivation)
  bool enable = 3; // Whether this file should be generated (example: true)
  optional string mode = 4; // File permissions (e.g., '0755') (example: "0644")
  optional string source = 5; // Module or component that generated this file (example: "stackpanel.ide.vscode")
  optional string description = 6; // Human-readable description of the file's purpose (example: "VS Code workspace settings generated by the IDE module")
  optional string store_path = 7; // Nix store path containing the file content (for derivation type) (example: "/nix/store/abc123-vscode-settings/settings.json")
  optional string text = 8; // Inline text content (for text type, may be truncated for large files) (example: "{\n  \"editor.formatOnSave\": true\n}\n")
}

// Collection of all generated file entries
message GeneratedFiles {
  bool enable = 1; // Whether file generation is enabled globally (example: true)
  map<string, GeneratedFile> entries = 2; // Map of file path to file configuration
}
