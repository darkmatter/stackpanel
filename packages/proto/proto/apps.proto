syntax = "proto3";

package stackpanel.db;
option go_package = "github.com/darkmatter/stackpanel/packages/proto/gen/gopb";

// Configuration for a single application in the workspace
message App {
  string name = 1; // Display name of the app
  optional string description = 2; // Description of the app
  string path = 3; // Relative path to the app directory
  optional string type = 4; // App type/runtime (bun, go, python, rust, etc.)
  optional int32 port = 5; // Development server port
  optional string domain = 6; // Local development domain
  /*
   * Environment configurations (key = environment name like "dev", "prod").
   * 
   */
  map<string, AppEnvironment> environments = 7;
  AppDeploy deploy = 8; // Colmena deployment mapping for this app
}

// Deployment mapping for Colmena (targets, roles, and modules)
message AppDeploy {
  bool enable = 1; // Enable deployment mapping for this app
  repeated string targets = 2; // Target machine ids or tag selectors
  optional string role = 3; // Deployment role label for this app
  repeated string nixos_modules = 4; // Extra NixOS modules to import for this app
  optional string system = 5; // Target system/architecture (e.g., x86_64-linux)
  repeated string secrets = 6; // Secret references required by this app during deploy
}

// Environment configuration (e.g., dev, staging, production)
message AppEnvironment {
  string name = 1; // Name of the environment
  optional string description = 2; // (optional) Description of the environment
  /*
   * Environment variables for this environment.
   * Key: Environment variable name (e.g., DATABASE_URL)
   * Value: Literal string or vals reference (e.g., ref+sops://...)
   * 
   */
  map<string, string> env = 3;
  repeated string extends = 4; // Inherit these environments - useful for sharing environment variables between environments.
}

// Map of app identifier to app configuration
message Apps {
  map<string, App> apps = 1; // Map of app ID to app config
}
