syntax = "proto3";

package stackpanel.db;
option go_package = "github.com/darkmatter/stackpanel/packages/proto/gen/go";

// Type of onboarding step
enum StepType {
  STEP_TYPE_UNSPECIFIED = 0;
  STEP_TYPE_COMMAND = 1;
  STEP_TYPE_MANUAL = 2;
  STEP_TYPE_CHECK = 3;
  STEP_TYPE_LINK = 4;
  STEP_TYPE_PROMPT = 5;
}

// Onboarding category configuration
message Category {
  string title = 1; // Display title for the category
  optional string description = 2; // Description of what this category covers
  int32 order = 3; // Order in which this category appears
  optional string icon = 4; // Icon for the category (emoji or Nerd Font icon)
}

// Onboarding configuration for new team members
message Onboarding {
  bool enable = 1; // Enable onboarding system
  string welcome_message = 2; // Welcome message shown to new team members
  string completion_message = 3; // Message shown when onboarding is complete
  map<string, Category> categories = 4; // Categories for organizing onboarding steps
  map<string, Step> steps = 5; // Onboarding steps
  bool auto_run = 6; // Automatically run onboarding on first shell entry
  bool persist_state = 7; // Persist completed steps across shell sessions
  string state_file = 8; // Path to store onboarding state
}

// Onboarding step configuration
message Step {
  string id = 1; // Unique identifier for this step
  string title = 2; // Display title for the step
  optional string description = 3; // Detailed description of what this step accomplishes
  StepType type = 4; // Type of onboarding step
  optional string command = 5; // Command to run (for 'command' type steps)
  optional string check_command = 6; // Command to verify step completion (exit 0 = complete)
  optional string url = 7; // URL to open (for 'link' type steps)
  bool required = 8; // Whether this step is required
  int32 order = 9; // Order in which this step should be presented
  string category = 10; // Category/group for organizing steps
  repeated string depends_on = 11; // List of step IDs that must be completed before this step
  repeated string env = 12; // Environments where this step applies
  optional string skip_if = 13; // Condition command - skip step if exits 0
}
