syntax = "proto3";

package stackpanel.db;
option go_package = "github.com/darkmatter/stackpanel/packages/proto/gen/gopb";

/*
 * A development shell script definition.
 * 
 * Scripts are compiled to Nix derivations via writeShellApplication and
 * bundled into a single package with all scripts in bin/. The script
 * name (attribute key) becomes the command name.
 * 
 * Scripts are simpler than tasks - they don't have build dependencies,
 * caching, or pipeline integration. Use them for ad-hoc utilities like
 * `db-seed`, `format`, or `generate-types`.
 * 
 */
message Script {
  optional string exec = 1; // Shell command to execute (mutually exclusive with path) (example: "bun run dev")
  optional string description = 2; // Human-readable description of the script (example: "Start the API server")
  map<string, string> env = 3; // Environment variables to set when running the script
  optional string bin_path = 4; // Path to script executable in Nix store (computed) (example: "/nix/store/abc123-scripts/bin/db-seed")
  optional string source = 5; // Source type: inline or path (for debugging) (example: "inline")
  repeated ScriptArg args = 6; // Documented arguments for this script
  optional int32 timeout = 7; // Maximum execution time in seconds (0 = no timeout, default: 300) (example: 300)
}

/*
 * Documentation for a script argument.
 * 
 * Arguments are purely for documentation purposes - they describe what
 * positional or named arguments the script accepts. The script itself
 * is responsible for parsing these arguments.
 * 
 */
message ScriptArg {
  string name = 1; // Argument name (e.g., 'file', '--output', '-v') (example: "--dry-run")
  optional string description = 2; // Human-readable description of the argument (example: "Preview changes without applying")
  optional bool required = 3; // Whether the argument is required (default: false) (example: false)
  optional string default = 4; // Default value if not provided (example: "production")
}

// Collection of development shell scripts
message Scripts {
  map<string, Script> scripts = 1; // Map of script name to script config
}

// Configuration for scripts package generation
message ScriptsConfig {
  bool enable = 1; // Whether to add the scripts package to the devshell (example: true)
}
