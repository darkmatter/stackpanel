# Generated by stackpanel - do not edit manually
# Regenerate by entering the devshell: nix develop --impure
#
# Deploy workflow (uses nix2container/dockerTools):
#   1. Build app:        bun run build (in app directory)
#   2. Build container:  container-build web
#   3. Push container:   container-copy web docker://registry.fly.io/
#   4. Deploy:           flyctl deploy --config packages/infra/fly/web/fly.toml --image registry.fly.io/stackpanel-web:latest
#
# Or use turbo workflow:
#   turbo run ship:web

app = "stackpanel-web"
org = "darkmatter"

# Build section removed - we use pre-built container images
# Container is built with nix2container/dockerTools and pushed via skopeo

[env]
PORT = '3000'

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = "suspend"
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

[[vm]]
memory = "512mb"
cpu_kind = "shared"
cpus = 1
