name = "stackpanel-api-router"
main = "src/index.ts"
compatibility_date = "2025-06-25"
compatibility_flags = ["nodejs_compat"]

[vars]
# OVH US-West — Americas traffic
API_ORIGIN_USW = "http://15.204.104.4"
# Hetzner Helsinki — Europe/Asia/default traffic (update once provisioned)
API_ORIGIN_HEL = "http://PLACEHOLDER_HEL_IP"

# Secrets (set via `wrangler secret put` — not stored here):
# none required for the router itself

# Optional: bind to the api.stackpanel.com route in the Cloudflare dashboard
# or via Alchemy's Workers.Route resource.
#
# [[routes]]
# pattern = "api.stackpanel.com/*"
# zone_name = "stackpanel.com"
