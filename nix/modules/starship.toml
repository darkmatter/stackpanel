"$schema" = 'https://starship.rs/config-schema.json'

format = """
[έΨΣέΨΤέΨΥ](fg:surface2)\
[ $os$username](bg:gray fg:white)\
[ΌΓ░](bg:black fg:gray)\
$directory\
[ΌΓ░](bg:white fg:black)\
$git_branch\
[ΌΓ░](fg:white bg:base)\
[ $git_status[ΌΓ░](fg:base)](bg:base)\
$fill\
$aws\
$nix_shell\
$time\
$line_break\
$shlvl\
$character"""




# right_format =  """
# $nix_shell\
# $aws\
# [ΌΓ▓](bg:white fg:black)\
# $git_branch\
# $git_status\
# [ΌΓ▓](bg:black fg:gray)\
# $time\
# """

palette = 'apathy'

[fill]
disabled = false
symbol = ' '

[os]
disabled = false
style = "bg:gray fg:white"

[os.symbols]
Windows = "ΌεΠ"
Ubuntu = "≤░ΧΙ"
SUSE = "ΎΝΦ"
Raspbian = "≤░Ρ┐"
Mint = "≤░μφ"
Macos = "≤░Α╡"
Manjaro = "ΎΝΤ"
Linux = "≤░Ν╜"
Gentoo = "≤░μρ"
Fedora = "≤░μδ"
Alpine = "ΎΝΑ"
Amazon = "ΎΚ░"
Android = "ΌεΟ"
AOSC = "ΎΝΒ"
Arch = "≤░μΘ"
Artix = "≤░μΘ"
CentOS = "ΎΝΕ"
Debian = "≤░μγ"
Redhat = "≤▒Εδ"
RedHatEnterprise = "≤▒Εδ"

[username]
show_always = true
style_user = "fg:white bg:gray"
style_root = "fg:red bg:gray"
format = '[ $user ]($style)'

[directory]
style = "bg:black fg:white"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "έΑο/"

[directory.substitutions]
"Documents" = "≤░Ιβ "
"Downloads" = "ΎΑβ "
"Music" = "≤░ζγ "
"Pictures" = "ΎΑ╛ "
"Developer" = "≤░▓Μ "

[git_branch]
symbol = "ΎΡα"
style = "bg:white fg:black"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bold bg:base fg:peach"
format = '[$all_status]($style)'
# format = '[ $all_status$ahead_behind ]($style)'

[git_metrics]
disabled = true
added_style = 'bg:base fg:green'
deleted_style = 'bg:base fg:red'
format = '[+$added]($added_style) [-$deleted]($deleted_style) '

[nodejs]
symbol = "Όεα"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

# ~/.config/starship.toml

[nix_shell]
disabled = false
impure_msg = '[impure](maroon)'
pure_msg = '[pure](sky)'
unknown_msg = '[unknown](mauve)'
format = '[ΎΜε $state( $name)](overlay0) '


[shlvl]
disabled = false
format = '[$symbol]($style)'
repeat = true
symbol = 'έζψ'
repeat_offset = 1

[shell]
fish_indicator = '≤░Ι║ '
powershell_indicator = 'ΎΣι_'
unknown_indicator = 'mystery shell'
style = 'cyan bold'
disabled = true

[c]
symbol = "Όαη "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = "Όηρ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = "Όαπ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = "ΌαΙ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[aws]
symbol = "ΎΚ░"
style = "fg:yellow"
format = '[[ $symbol( $version) ](fg:crust)]($style)'

[java]
symbol = "ΌΚΨ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = "Όα┤"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = "Όαθ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = "ΌαΗ"
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

[docker_context]
symbol = "ΎΝΙ"
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'

[conda]
symbol = " ΎΕΝ "
style = "fg:crust bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "fg:subtext0"
format = '[ ΎΡ║ $time ]($style)'

[battery]
# full_symbol = 'ΏθΦΜ '
# charging_symbol = 'έγκΎ╕Π '
# discharging_symbol = 'ΏθΤΑ '
format = '[$symbol$percentage]($style) '
disabled = false

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[έζψ](bold fg:green)'
error_symbol = '[έζψ](bold fg:red)'
vimcmd_symbol = '[έζχ](bold fg:green)'
vimcmd_replace_one_symbol = '[έζχ](bold fg:lavender)'
vimcmd_replace_symbol = '[έζχ](bold fg:lavender)'
vimcmd_visual_symbol = '[έζχ](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = "Ότ┤ in $duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[palettes.apathy]
gray = "#575B60"
black = "#16181D"
white = "#D7D8E0"
rosewater = "#f0c9dd"
flamingo = "#f0c9dd"
pink = "#f5c2e7"
mauve = "#998fe1"
red = "#bb4561"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#ffcb6b"
green = "#a6e3a1"
teal = "#93e3db"
sky = "#baf8e5"
sapphire = "#33b3cc"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

