name: Provision database

on:
  workflow_dispatch:
    inputs:
      db_name:
        description: Database name to create (Postgres identifier)
        required: true
        type: string
      snapshot_uri:
        description: Optional seed snapshot (e.g. s3://bucket/path.dump)
        required: false
        type: string
      db_user:
        description: Optional database user (defaults to sp_<db_name>)
        required: false
        type: string

permissions:
  contents: read

jobs:
  provision:
    name: Provision DB (internal runner)
    runs-on: self-hosted
    # Safety: avoid running untrusted refs on a self-hosted runner.
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Provision database and (optionally) restore snapshot
        shell: bash
        env:
          DB_NAME: ${{ inputs.db_name }}
          DB_USER: ${{ inputs.db_user }}
          SNAPSHOT_URI: ${{ inputs.snapshot_uri }}

          # Postgres admin connection (runner must be able to reach internal host)
          PGHOST: ${{ secrets.PROVISION_PGHOST }}
          PGPORT: ${{ secrets.PROVISION_PGPORT }}
          PGUSER: ${{ secrets.PROVISION_PGUSER }}
          PGPASSWORD: ${{ secrets.PROVISION_PGPASSWORD }}
          PGSSLMODE: ${{ secrets.PROVISION_PGSSLMODE }}

          # Optional S3/MinIO access (only required when snapshot_uri is set)
          AWS_REGION: ${{ secrets.SEED_AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SEED_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SEED_AWS_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.SEED_S3_ENDPOINT_URL }}
        run: |
          bash ./infra/scripts/provision-db.sh

      - name: Upload connection artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-connection
          path: db_connection.json
          if-no-files-found: error




