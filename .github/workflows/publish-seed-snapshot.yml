name: Publish seed snapshot

on:
  workflow_dispatch:
    inputs:
      snapshot_uri:
        description: Snapshot destination (e.g. s3://bucket/path.dump)
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish seed snapshot (internal runner)
    runs-on: self-hosted
    # Safety: avoid running untrusted refs on a self-hosted runner.
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create and upload snapshot
        shell: bash
        env:
          SNAPSHOT_URI: ${{ inputs.snapshot_uri }}
          SOURCE_DATABASE_URL: ${{ secrets.SEED_SOURCE_DATABASE_URL }}
          AWS_REGION: ${{ secrets.SEED_AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SEED_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SEED_AWS_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.SEED_S3_ENDPOINT_URL }}
        run: |
          bash ./infra/scripts/publish-seed-snapshot.sh




