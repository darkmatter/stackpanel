# Build and cache the nix devshell to Cachix for faster CI and local builds.
#
# Setup required:
# 1. Create a cachix cache at https://app.cachix.org/cache (name: stackpanel)
# 2. Get the auth token from the cache settings
# 3. Add CACHIX_AUTH_TOKEN to GitHub repo secrets
# 4. Update the public key below (find it at https://app.cachix.org/cache/stackpanel -> Settings)

name: "Build and cache devshell"

on:
  # push:
  #   branches:
  #     - main
  # pull_request:
  #   branches:
  #     - main
  workflow_dispatch: # Allow manual triggers

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  devshell-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: macos-latest
            system: aarch64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            extra-substituters = https://devenv.cachix.org https://darkmatter.cachix.org
            extra-trusted-public-keys = devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw= darkmatter.cachix.org-1:FM0VM+D2fvMt8R899nyKsAxkcwERzDVYaeJEZ9oKejQ=

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: darkmatter
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: devenv

      - name: Build devshell
        run: nix build --impure '.#devShells.${{ matrix.system }}.default' --no-link

      - name: Test devshell
        run: nix develop --impure --command echo "Shell works!"
