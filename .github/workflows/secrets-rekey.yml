# Auto-generated by stackpanel secrets:init-group
# DO NOT EDIT — re-run secrets:init-group to regenerate.
#
# Re-encrypts group .enc.age files when the recipients list changes.
# Self-service team onboarding:
#   1. New member enters devshell (auto-generates AGE key)
#   2. Their .age.pub is registered in .stackpanel/secrets/recipients/
#   3. They commit + push the .age.pub file
#   4. This workflow re-encrypts .enc.age files for ALL recipients
#   5. They pull and can now decrypt secrets

name: Secrets Rekey

on:
  push:
    paths:
      - '.stackpanel/secrets/recipients/**.age.pub'

permissions:
  contents: write

jobs:
  rekey:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ github.token }}

      - name: Install age and sops
        run: |
          AGE_VERSION="1.2.0"
          curl -fsSL "https://github.com/FiloSottile/age/releases/download/v${AGE_VERSION}/age-v${AGE_VERSION}-linux-amd64.tar.gz" | tar xz
          sudo mv age/age age/age-keygen /usr/local/bin/
          SOPS_VERSION="3.9.4"
          curl -fsSL "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64" -o /usr/local/bin/sops
          chmod +x /usr/local/bin/sops

      - name: Collect recipient public keys
        id: recipients
        run: |
          RECIPIENTS_DIR=".stackpanel/secrets/recipients"
          if [[ ! -d "${RECIPIENTS_DIR}" ]]; then
            echo "No recipients directory found" >&2
            exit 1
          fi
          ALL_PUBS=""
          COUNT=0
          # Collect flat .age.pub files
          for pub_file in "${RECIPIENTS_DIR}"/*.age.pub; do
            [[ -f "${pub_file}" ]] || continue
            PUB_KEY=$(cat "${pub_file}" | tr -d '[:space:]')
            if [[ -n "${PUB_KEY}" ]]; then
              ALL_PUBS="${ALL_PUBS} ${PUB_KEY}"
              COUNT=$((COUNT + 1))
              echo "  + $(basename "${pub_file}"): ${PUB_KEY}"
            fi
          done
          # Collect group subdirectory .age.pub files
          for group_dir in "${RECIPIENTS_DIR}"/*/; do
            [[ -d "${group_dir}" ]] || continue
            [[ "$(basename "${group_dir}")" == ".archive" ]] && continue
            for pub_file in "${group_dir}"*.age.pub; do
              [[ -f "${pub_file}" ]] || continue
              PUB_KEY=$(cat "${pub_file}" | tr -d '[:space:]')
              if [[ -n "${PUB_KEY}" ]]; then
                ALL_PUBS="${ALL_PUBS} ${PUB_KEY}"
                COUNT=$((COUNT + 1))
                echo "  + $(basename "${pub_file}"): ${PUB_KEY}"
              fi
            done
          done
          if [[ ${COUNT} -eq 0 ]]; then
            echo "No recipient public keys found" >&2
            exit 1
          fi
          # Deduplicate
          ALL_PUBS=$(echo "${ALL_PUBS}" | tr ' ' '\n' | sort -u | tr '\n' ' ' | sed 's/^ //;s/ $//')
          UNIQUE_COUNT=$(echo "${ALL_PUBS}" | wc -w | tr -d ' ')
          echo "Found ${UNIQUE_COUNT} unique recipient(s)"
          echo "pubs=${ALL_PUBS}" >> "${GITHUB_OUTPUT}"
          echo "count=${UNIQUE_COUNT}" >> "${GITHUB_OUTPUT}"

      - name: Regenerate recipients/.sops.yaml
        run: |
          RECIPIENTS_DIR=".stackpanel/secrets/recipients"
          ALL_PUBS="${{ steps.recipients.outputs.pubs }}"
          AGE_LINES=""
          for PUB_KEY in ${ALL_PUBS}; do
            AGE_LINES="${AGE_LINES}
                    - ${PUB_KEY}"
          done
          cat > "${RECIPIENTS_DIR}/.sops.yaml" <<SOPSEOF
          # Auto-generated by stackpanel secrets-rekey workflow
          # DO NOT EDIT — changes will be overwritten.

          creation_rules:
            - path_regex: \.enc\.age\$
              key_groups:
                - age:${AGE_LINES}
          SOPSEOF
          echo "Generated .sops.yaml with ${{ steps.recipients.outputs.count }} recipient(s)"

      - name: Re-encrypt group .enc.age files
        env:
          SECRET_DEV: ${{ secrets.SECRETS_AGE_KEY_DEV }}
          SECRET_PROD: ${{ secrets.SECRETS_AGE_KEY_PROD }}
        run: |
          RECIPIENTS_DIR=".stackpanel/secrets/recipients"
          REKEY_COUNT=0
          for enc_file in "${RECIPIENTS_DIR}"/*.enc.age; do
            [[ -f "${enc_file}" ]] || continue
            GROUP=$(basename "${enc_file}" .enc.age)
            GROUP_UPPER=$(echo "${GROUP}" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
            PRIVATE_KEY_VAR="SECRET_${GROUP_UPPER}"
            PRIVATE_KEY="${!PRIVATE_KEY_VAR}"
            if [[ -z "${PRIVATE_KEY}" ]]; then
              echo "  Warning: No secret for SECRETS_AGE_KEY_${GROUP_UPPER}, skipping"
              continue
            fi
            echo "Processing group: ${GROUP}"
            TMPDIR_REKEY=$(mktemp -d)
            echo "${PRIVATE_KEY}" > "${TMPDIR_REKEY}/plain.txt"
            if sops --config "${RECIPIENTS_DIR}/.sops.yaml" \
                    --filename-override "${enc_file}" \
                    --encrypt --input-type binary --output-type binary \
                    "${TMPDIR_REKEY}/plain.txt" > "${TMPDIR_REKEY}/encrypted.bin" 2>/dev/null; then
              mv "${TMPDIR_REKEY}/encrypted.bin" "${enc_file}"
              REKEY_COUNT=$((REKEY_COUNT + 1))
              echo "  Re-encrypted: ${enc_file}"
            else
              echo "  Error: Failed to re-encrypt ${enc_file}" >&2
              rm -rf "${TMPDIR_REKEY}"
              exit 1
            fi
            rm -rf "${TMPDIR_REKEY}"
          done
          echo "Re-encrypted ${REKEY_COUNT} group key(s)"

      - name: Commit and push re-encrypted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .stackpanel/secrets/recipients/.sops.yaml
          git add .stackpanel/secrets/recipients/*.enc.age
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(secrets): rekey group keys for updated recipients"
            git push
          fi
