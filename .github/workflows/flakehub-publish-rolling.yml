name: "Publish every Git push to main to FlakeHub"
on:
  push:
    branches:
      - "main"
jobs:
  flakehub-publish:
    runs-on: "ubuntu-latest"
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - uses: "actions/checkout@v5"
        with:
          persist-credentials: false
      - uses: "DeterminateSystems/determinate-nix-action@v3"
        with:
          extra-conf: |
            allow-import-from-derivation = true
      - uses: "DeterminateSystems/flakehub-push@main"
        env:
          # Skip devenv since FlakeHub uses pure evaluation
          SKIP_DEVENV: "true"
          NIX_CONFIG: "accept-flake-config = true"
        with:
          name: "darkmatter/stackpanel"
          rolling: true
          visibility: "unlisted"
          # Don't evaluate outputs - devenv requires --impure which flakehub-push doesn't support
          include-output-paths: false
