name: Deploy API

on:
  push:
    branches: [main, develop, "feat/cloud-gate-**"]
    paths:
      - "apps/api/**"
      - "packages/api/**"
      - "packages/auth/**"
      - "packages/db/**"
      - "packages/gen/env/**"
      - "packages/infra/**"
      - ".sops.yaml"
      - ".stack/config.nix"
      - ".stack/config.apps.nix"
      - "bun.lock"
      - "package.json"
      - ".github/workflows/deploy-api.yaml"
  pull_request:
    types: [opened, reopened, synchronize, closed]
    paths:
      - "apps/api/**"
      - "packages/api/**"
      - "packages/auth/**"
      - "packages/db/**"
      - "packages/gen/env/**"
      - "packages/infra/**"
      - ".github/workflows/deploy-api.yaml"
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage to deploy (e.g. production, staging, pr-42)"
        required: true
        type: string

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

# CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID aren't set as GH secrets —
# they live in the SOPS-encrypted deploy scope and `loadDeployEnv` injects
# them into process.env at the start of alchemy.run.ts.

jobs:
  stage:
    runs-on: ubuntu-latest
    outputs:
      stage: ${{ steps.resolve.outputs.stage }}
      action: ${{ steps.resolve.outputs.action }}
    steps:
      - id: resolve
        run: |
          set -euo pipefail
          event="${{ github.event_name }}"
          if [[ "$event" == "workflow_dispatch" ]]; then
            stage="${{ inputs.stage }}"
            action="deploy"
          elif [[ "$event" == "push" ]]; then
            case "${{ github.ref_name }}" in
              main)    stage="production" ;;
              develop) stage="staging" ;;
              *)       stage="dev_$(echo "${{ github.ref_name }}" | tr '/' '_' | tr -c 'a-zA-Z0-9_' '_')" ;;
            esac
            action="deploy"
          elif [[ "$event" == "pull_request" ]]; then
            stage="pr-${{ github.event.pull_request.number }}"
            if [[ "${{ github.event.action }}" == "closed" ]]; then
              action="destroy"
            else
              action="deploy"
            fi
          fi
          echo "stage=$stage" >> "$GITHUB_OUTPUT"
          echo "action=$action" >> "$GITHUB_OUTPUT"
          echo "Resolved: $action stage=$stage"

  deploy:
    needs: stage
    if: needs.stage.outputs.action == 'deploy'
    runs-on: ubuntu-latest
    environment:
      name: api-${{ needs.stage.outputs.stage }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # alchemy-effect ships only a filesystem state backend; caching the
      # .alchemy/state/ directory lets the destroy job on PR close find the
      # resources to tear down without orphaning Workers.
      - name: Restore alchemy state
        uses: actions/cache@v4
        with:
          path: apps/api/.alchemy
          key: alchemy-state-api-${{ needs.stage.outputs.stage }}
      - name: Deploy
        id: deploy
        working-directory: apps/api
        env:
          STAGE: ${{ needs.stage.outputs.stage }}
          # SOPS AGE key for loadAppEnv (sops-age) to decrypt per-app
          # payloads. Production uses the prod key; everything else (staging,
          # pr-*, dev) uses the dev key.
          SOPS_AGE_KEY: ${{ needs.stage.outputs.stage == 'production' && secrets.SECRETS_AGE_KEY_PROD || secrets.SECRETS_AGE_KEY_DEV }}
          # stackpanel.deployment.alchemy declares ALCHEMY_STATE_TOKEN in the
          # deploy env scope for its CloudflareStateStore — we use the local
          # filesystem state (cached across runners) instead. Passing a
          # placeholder satisfies the required-env validator.
          ALCHEMY_STATE_TOKEN: ci-local-state-placeholder
        run: |
          set -euo pipefail
          bunx alchemy-effect deploy --stage ${{ needs.stage.outputs.stage }}
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-api
          message: |
            API preview deployed to `${{ needs.stage.outputs.stage }}`

  destroy:
    needs: stage
    if: needs.stage.outputs.action == 'destroy'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Restore alchemy state
        uses: actions/cache/restore@v4
        with:
          path: apps/api/.alchemy
          key: alchemy-state-api-${{ needs.stage.outputs.stage }}
      - name: Destroy PR preview
        working-directory: apps/api
        env:
          STAGE: ${{ needs.stage.outputs.stage }}
          SOPS_AGE_KEY: ${{ secrets.SECRETS_AGE_KEY_DEV }}
        run: |
          set -euo pipefail
          bunx alchemy-effect destroy --stage ${{ needs.stage.outputs.stage }}
      - name: Delete cached alchemy state
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache delete "alchemy-state-api-${{ needs.stage.outputs.stage }}" \
            --repo "${{ github.repository }}" || true
      - name: Mark preview comment as torn down
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-api
          message: |
            API preview `${{ needs.stage.outputs.stage }}` has been destroyed.
