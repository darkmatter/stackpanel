name: "om ci"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allow manual triggers

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  configure:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            extra-substituters = https://devenv.cachix.org https://darkmatter.cachix.org
            extra-trusted-public-keys = devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw= darkmatter.cachix.org-1:7R5qAiOVHxDpFy7yguECfC1JqVDgMdckGc+CDKk2pWA=
      - name: Install omnix
        run: nix --accept-flake-config profile install github:juspay/omnix
      - id: set-matrix
        run: |
          set -euxo pipefail
          # Get matrix for both Linux and Darwin
          MATRIX="$(om ci gh-matrix --systems=x86_64-linux,aarch64-darwin -- --impure | jq -c .)"
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  nix:
    # Map Nix systems to GitHub runner labels
    runs-on: ${{ matrix.system == 'aarch64-darwin' && 'depot-macos-latest' || matrix.system }}
    needs: configure
    strategy:
      matrix: ${{ fromJson(needs.configure.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            extra-substituters = https://devenv.cachix.org https://darkmatter.cachix.org
            extra-trusted-public-keys = devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw= darkmatter.cachix.org-1:7R5qAiOVHxDpFy7yguECfC1JqVDgMdckGc+CDKk2pWA=
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: darkmatter
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: devenv
      - name: Install omnix
        run: nix --accept-flake-config profile install github:juspay/omnix
      - name: Run om ci
        env:
          # Skip devenv on Darwin to avoid container outputs that require Linux-only packages (shadow)
          SKIP_DEVENV: ${{ matrix.system == 'aarch64-darwin' && 'true' || '' }}
        run: om ci run --systems "${{ matrix.system }}" ".#default.${{ matrix.subflake }}" -- --impure

