name: "deploy nixos"

on:
  workflow_dispatch:
    inputs:
      app:
        description: "App to deploy"
        required: true
        default: "web"
        type: choice
        options:
          - web
      stage:
        description: "Deployment stage"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod

concurrency:
  group: deploy-${{ github.event.inputs.app }}-${{ github.event.inputs.stage }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      store-path: ${{ steps.build.outputs.store-path }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            extra-substituters = https://devenv.cachix.org https://darkmatter.cachix.org
            extra-trusted-public-keys = devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw= darkmatter.cachix.org-1:7R5qAiOVHxDpFy7yguECfC1JqVDgMdckGc+CDKk2pWA=

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: darkmatter
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: devenv

      - name: Build package
        id: build
        run: |
          nix build .#${{ github.event.inputs.app }} --accept-flake-config --impure
          STORE_PATH=$(readlink -f result)
          echo "store-path=$STORE_PATH" >> "$GITHUB_OUTPUT"
          echo "Built: $STORE_PATH"

      - name: Push to Cachix
        run: cachix push darkmatter ./result

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            extra-substituters = https://devenv.cachix.org https://darkmatter.cachix.org
            extra-trusted-public-keys = devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw= darkmatter.cachix.org-1:7R5qAiOVHxDpFy7yguECfC1JqVDgMdckGc+CDKk2pWA=

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: darkmatter
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: devenv

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-west-2

      - name: Install Colmena
        run: nix profile install nixpkgs#colmena --accept-flake-config

      - name: Deploy via Colmena
        env:
          STAGE: ${{ github.event.inputs.stage }}
        run: |
          colmena apply \
            --flake . \
            --on @web \
            --substitute-on-destination \
            --impure
