# SOPS configuration for group secret files
#
# Each group's YAML file is encrypted to that group's AGE key.
# The group AGE keys are stored in ../keys/<group>.enc.age
# (themselves encrypted via KMS + backup AGE key).
#
# To decrypt: the group's AGE private key must be in SOPS_AGE_KEY env var
# (loaded from SSM at runtime, or decrypted from the .enc.age file).

creation_rules:
  # Group secret files — encrypted to the dev group AGE key
  - path_regex: .*\.yaml$
    key_groups:
      - age:
          - age1vl6ynls02q44p823lgmjs5t9hkq9xqvgtgvhcht6vaua65syeatqxzz5fa
