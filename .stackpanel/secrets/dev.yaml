# Dev environment secrets
# This file should be encrypted with SOPS before committing
#
# To encrypt: sops -e -i dev.yaml
# To edit:    sops dev.yaml
#
# Secrets are referenced in variables.nix as:
#   ref+sops://.stackpanel/secrets/dev.yaml#/KEY_NAME

# Example secrets (replace with real values before encrypting):
OPENAI_API_KEY: "your-openai-api-key-here"
DATABASE_URL: "postgresql://user:pass@localhost:5432/dev"
