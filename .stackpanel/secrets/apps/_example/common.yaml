# Common schema shared across all environments
# Schema: .stackpanel/gen/schemas/secrets/schema.schema.json
#
# Define secrets that exist in ALL environments.
# Environment-specific files (dev.yaml, prod.yaml) can override these.

DATABASE_URL:
  required: true
  sensitive: true
  description: PostgreSQL connection string

REDIS_URL:
  required: true
  sensitive: true
  description: Redis connection URL

LOG_LEVEL:
  required: false
  sensitive: false
  default: info
  description: Logging level (debug, info, warn, error)

# Non-sensitive secrets get PUBLIC_ prefix in generated code
# Safe to expose to client-side code
STRIPE_PUBLISHABLE_KEY:
  required: true
  sensitive: false
  description: Stripe publishable key (safe for client)
