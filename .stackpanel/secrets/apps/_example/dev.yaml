# Development Environment Configuration
# Schema: .stackpanel/gen/schemas/secrets/env.schema.json
#
# Dev-specific schema overrides and access control.

# Schema additions/overrides for dev environment
schema:
  DEBUG:
    required: false
    sensitive: false
    description: Enable debug mode

  # Override LOG_LEVEL default for dev
  LOG_LEVEL:
    default: debug

# Users who can access dev secrets (names from users.yaml)
users:
  - alice
  - bob
  - charlie

# Additional AGE keys (CI systems, dev servers, etc.)
extraKeys: []
