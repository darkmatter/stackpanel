# Production Environment Configuration
# Schema: .stackpanel/gen/schemas/secrets/env.schema.json
#
# Prod-specific schema overrides and access control.
# Be restrictive with who can access production secrets.

# Schema additions for production
schema:
  SENTRY_DSN:
    required: true
    sensitive: true
    description: Sentry error tracking DSN

  # Prod doesn't need DEBUG
  # LOG_LEVEL stays at default "info" from common.yaml

# Only admins should access prod secrets
users:
  - alice

# CI/CD system keys for deployments
extraKeys:
  # Example: GitHub Actions deploy key
  # - age1githubactions...
