# App Configuration - Codegen Settings
# Schema: .stackpanel/gen/schemas/secrets/app-config.schema.json
#
# This file configures code generation for typed environment access.
# The generated code provides type-safe access to your secrets.

codegen:
  # Target language: typescript | python | go | null (disabled)
  language: typescript

  # Output path for generated code (relative to repo root)
  path: packages/api/src/env.ts
