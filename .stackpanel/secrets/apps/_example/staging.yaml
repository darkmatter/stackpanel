# Staging Environment Configuration
# Schema: .stackpanel/gen/schemas/secrets/env.schema.json

# Schema additions for staging (similar to prod but less restrictive access)
schema:
  SENTRY_DSN:
    required: false
    sensitive: true
    description: Sentry error tracking DSN (optional in staging)

# More users can access staging than prod
users:
  - alice
  - bob

extraKeys: []
