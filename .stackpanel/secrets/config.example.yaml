# Stackpanel Secrets - Global Configuration
# Schema: .stackpanel/gen/schemas/secrets/config.schema.json

# Backend for secret resolution
# - vals: Multi-backend resolver (SOPS, AWS Secrets Manager, 1Password, Vault, Doppler)
# - sops: Direct SOPS usage only
backend: vals

# Directory for encrypted secrets files (relative to repo root)
secretsDir: secrets

# Generate placeholder .yaml files for each app/environment
generatePlaceholders: true

# Default environments for all apps
defaultEnvironments:
  - dev
  - staging
  - prod
