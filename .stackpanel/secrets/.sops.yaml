# SOPS configuration for stackpanel secrets
# This file defines encryption rules for secrets by environment (key group)
#
# File types:
#   - dev.yaml, staging.yaml, prod.yaml: Encrypted secrets
#   - vars.yaml: Plaintext shared configuration (NOT encrypted)

keys:
  # Project master key (auto-generated, stored in keys/master.key.age)
  - &master age1mr42zd88679gyrk34f5cy8yx2axdrw39f2wq9q3y2du07kxluv5q9cwheu

  # Team member keys can be added here:
  # - &alice age1abc...
  # - &bob age1def...

creation_rules:
  # Shared variables (NOT encrypted - plaintext YAML)
  # Use /var/* prefix in variables.nix for these
  - path_regex: ^vars\.yaml$
    unencrypted_regex: ".*"

  # Dev environment secrets
  - path_regex: ^dev\.yaml$
    key_groups:
      - age:
          - *master
          # Add team member keys who need dev access:
          # - *alice
          # - *bob

  # Staging environment secrets
  - path_regex: ^staging\.yaml$
    key_groups:
      - age:
          - *master

  # Production environment secrets
  - path_regex: ^prod\.yaml$
    key_groups:
      - age:
          - *master
          # Restrict prod access to specific team members:
          # - *alice
