# SOPS configuration for stackpanel secrets
#
# Group YAML files (groups/dev.yaml, groups/staging.yaml, groups/prod.yaml)
# contain encrypted secret values. Each group has its own AGE key stored
# in keys/<group>.enc.age, which is itself encrypted via KMS + backup AGE key.
#
# Plaintext shared config (vars.yaml) uses unencrypted_regex to skip encryption.
#
# To decrypt group secrets, the group's AGE private key must be available via:
#   - SOPS_AGE_KEY env var (loaded from SSM or decrypted .enc.age file)
#   - SOPS_AGE_KEY_FILE pointing to a decrypted key file

creation_rules:
  # Shared variables (NOT encrypted - plaintext YAML)
  - path_regex: ^vars\.yaml$
    unencrypted_regex: ".*"

  # Group secret files are encrypted to that group's AGE key
  # The actual recipients are managed per-group via explicit --age flags
  # when writing secrets (see secrets_groups.go)
