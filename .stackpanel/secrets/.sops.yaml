# SOPS configuration for stackpanel secrets
#
# Value files live in vars/<group>.sops.yaml and contain both encrypted
# and plaintext values. Plaintext values are marked with a "# safe" comment.
#
# Group private keys are stored as recipients/<group>.enc.age (encrypted to
# all team members' public keys in recipients/*.age.pub).
#
# To decrypt, the group's AGE private key must be available via:
#   - SOPS_AGE_KEY_CMD (set automatically in devshell)
#   - recipients/<group>.age (decrypted .enc.age file)

creation_rules:
  # Vars files use unencrypted_comment_regex so values preceded by "# safe"
  # are stored in plaintext. All other values are encrypted.
  # The actual per-group AGE recipients are managed via explicit --age flags
  # or via vars/.sops.yaml (auto-generated from config.nix).
