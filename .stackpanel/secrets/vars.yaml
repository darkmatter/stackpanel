# Shared configuration variables (NOT encrypted)
# This file is plaintext and safe to commit to version control.
#
# Use for non-sensitive config that needs to be shared across apps/environments.
# Reference in variables.nix with /var/* prefix:
#   "/var/API_ENDPOINT" = { value = "https://api.example.com"; };
#
# Or use vals reference for dynamic loading:
#   "/var/LOG_LEVEL" = { value = "ref+yaml://.stackpanel/secrets/vars.yaml#/LOG_LEVEL"; };
#
# Example usage in app environments:
#   environments.dev.env = {
#     API_ENDPOINT = "ref+yaml://.stackpanel/secrets/vars.yaml#/API_ENDPOINT";
#     LOG_LEVEL = "debug";  # Can also use literal values
#   };

# Shared configuration values
LOG_LEVEL: info
NODE_ENV: development
API_VERSION: v1

# Feature flags
ENABLE_ANALYTICS: "false"
ENABLE_DEBUG_MODE: "true"

# Service endpoints (non-sensitive)
# API_ENDPOINT: https://api.example.com
# CDN_URL: https://cdn.example.com
