
inputs:
  devenv:
    url: git+https://github.com/cachix/devenv?ref=refs/tags/v1.11.2
  nixpkgs:
    url: git+https://github.com/cachix/devenv-nixpkgs?ref=rolling
  nixpkgs-unstable:
    url: git+https://github.com/NixOS/nixpkgs?ref=nixpkgs-unstable
  treefmt-nix:
    url: git+https://github.com/numtide/treefmt-nix
    inputs:
      nixpkgs:
        follows: nixpkgs-unstable
  git-hooks:
    url: git+https://github.com/cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs-unstable
allowUnfree: true
clean:
  enabled: true
  keep:
    - HOME
    - DEVENV_ORIG_HOME
    - TURBO_TOKEN
    - CI
    - TERM
    - DEVENV_CMDLINE
